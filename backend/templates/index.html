<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepBlue — Water Safety Intelligence</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js"></script>

<style>
:root {
  --bg:          #07090d;
  --surface:     #0d1017;
  --card:        #131822;
  --card-hover:  #18202e;
  --border:      #1c2538;
  --border-b:    #263045;
  --blue:        #3b82f6;
  --blue-bright: #60a5fa;
  --blue-dim:    rgba(59,130,246,0.08);
  --blue-glow:   rgba(59,130,246,0.22);
  --white:       #f0f4f8;
  --muted:       #3d4f68;
  --muted-l:     #7a91ae;
  --safe:        #3b82f6;
  --moderate:    #f59e0b;
  --danger:      #ef4444;
  --mono:        'IBM Plex Mono', monospace;
  --sans:        'Inter', sans-serif;
  --sidebar:     355px;
  --sheet-h:     260px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--white); font-family: var(--sans); }

/* ── App shell ── */
#app { display: flex; height: 100vh; width: 100vw; }

/* ════════════════════ SIDEBAR ════════════════════ */
#sidebar {
  width: var(--sidebar);
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--surface);
  border-right: 1px solid var(--border);
  flex-shrink: 0;
  overflow: hidden;
  z-index: 10;
}

.sb-header {
  padding: 22px 22px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.logo { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
.logo-mark {
  width: 34px; height: 34px; border-radius: 9px;
  background: linear-gradient(135deg, #1d4ed8, var(--blue));
  box-shadow: 0 0 22px var(--blue-glow);
  display: grid; place-items: center; font-size: 16px; flex-shrink: 0;
}
.logo-text { font-size: 19px; font-weight: 700; letter-spacing: .1em; }
.logo-sub  { font-size: 10px; color: var(--muted-l); letter-spacing: .05em; text-transform: uppercase; }

.section-label {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 22px 8px;
  font-size: 9.5px; font-weight: 600; letter-spacing: .14em;
  text-transform: uppercase; color: var(--muted); flex-shrink: 0;
}
.live-pill {
  display: flex; align-items: center; gap: 5px;
  font-size: 9px; font-weight: 700; color: var(--blue-bright);
  background: rgba(59,130,246,.1); border: 1px solid rgba(59,130,246,.2);
  padding: 2px 8px; border-radius: 100px;
}
.pulse { width: 5px; height: 5px; border-radius: 50%; background: var(--blue); animation: pulse 2s infinite; }
@keyframes pulse {
  0%,100% { opacity:1; box-shadow:0 0 0 0 rgba(59,130,246,.7); }
  60%      { opacity:.6; box-shadow:0 0 0 5px rgba(59,130,246,0); }
}

/* Site list — takes all remaining height */
#site-list {
  flex: 1; overflow-y: auto; padding: 4px 10px 8px;
  display: flex; flex-direction: column; gap: 5px;
}
#site-list::-webkit-scrollbar { width: 3px; }
#site-list::-webkit-scrollbar-thumb { background: var(--border-b); border-radius: 3px; }

.site-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 13px 15px;
  cursor: pointer; transition: border-color .18s, background .18s, transform .18s;
}
.site-card:hover { border-color: var(--border-b); background: var(--card-hover); transform: translateX(2px); }
.site-card.active {
  border-color: var(--blue); background: var(--blue-dim);
  box-shadow: 0 0 0 1px var(--blue) inset, 0 0 24px rgba(59,130,246,.08);
}
.sc-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; gap: 8px; }
.sc-name { font-size: 12.5px; font-weight: 600; line-height: 1.35; }
.badge {
  font-size: 8.5px; font-weight: 700; letter-spacing: .1em;
  text-transform: uppercase; padding: 3px 8px; border-radius: 100px; flex-shrink: 0;
}
.b-safe      { background:rgba(59,130,246,.12); color:var(--safe);     border:1px solid rgba(59,130,246,.25); }
.b-moderate  { background:rgba(245,158,11,.12); color:var(--moderate); border:1px solid rgba(245,158,11,.25); }
.b-dangerous { background:rgba(239,68,68,.12);  color:var(--danger);   border:1px solid rgba(239,68,68,.25); }
.b-unknown   { background:rgba(61,79,104,.15);  color:var(--muted-l);  border:1px solid var(--border); }
.sc-metrics { display: grid; grid-template-columns:1fr 1fr 1fr; gap: 8px; }
.sc-ml { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 2px; }
.sc-mv { font-family: var(--mono); font-size: 13px; font-weight: 500; }

/* Report form */
.report-section {
  border-top: 1px solid var(--border);
  padding: 14px 22px 18px; flex-shrink: 0; background: var(--surface);
}
.report-section .section-label { padding: 0 0 10px; }
.form-col { display: flex; flex-direction: column; gap: 7px; }
select.fi, .fi {
  width: 100%; background: var(--card); border: 1px solid var(--border);
  color: var(--white); border-radius: 8px; padding: 8px 11px;
  font-size: 11.5px; font-family: var(--sans); outline: none;
  transition: border-color .18s; appearance: none;
}
select.fi:focus { border-color: var(--blue); }
select.fi option { background: var(--card); }
.drop-zone {
  border: 1px dashed var(--border-b); border-radius: 8px;
  padding: 11px; text-align: center; cursor: pointer; position: relative; transition: all .2s;
}
.drop-zone:hover, .drop-zone.over { border-color: var(--blue); background: var(--blue-dim); }
.drop-zone input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.drop-lbl { font-size: 10.5px; color: var(--muted-l); pointer-events: none; }
.drop-lbl span { color: var(--blue-bright); }
#fname { font-size: 9.5px; color: var(--blue-bright); font-family: var(--mono); margin-top: 2px; min-height: 14px; }
.submit-btn {
  width: 100%; padding: 10px; border: none; border-radius: 8px;
  background: var(--blue); color: #fff;
  font-size: 11.5px; font-weight: 700; letter-spacing: .09em;
  text-transform: uppercase; cursor: pointer; transition: all .2s;
  box-shadow: 0 0 22px rgba(59,130,246,.28);
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.submit-btn:hover { background: var(--blue-bright); box-shadow: 0 0 34px rgba(59,130,246,.45); }
#notif { min-height: 16px; margin-top: 6px; font-size: 10.5px; }
.toast-success { color: var(--blue-bright); }
.toast-error   { color: var(--danger); }

/* ════════════════════ MAP ════════════════════ */
#map { flex: 1; height: 100vh; }
.leaflet-control-attribution { background: rgba(7,9,13,.85) !important; color: var(--muted) !important; font-size: 9px !important; }
.leaflet-control-attribution a { color: var(--muted-l) !important; }
.leaflet-control-zoom a { background: var(--card) !important; color: var(--white) !important; border-color: var(--border) !important; }

/* ════════════════════ BOTTOM SHEET ════════════════════ */
#detail-sheet {
  position: fixed;
  bottom: 0;
  left: var(--sidebar);   /* sits over the map only, not the sidebar */
  right: 0;
  z-index: 200;
  transform: translateY(100%);
  transition: transform .38s cubic-bezier(0.32, 0, 0.67, 0);
  pointer-events: none;
}
#detail-sheet.open {
  transform: translateY(0);
  transition: transform .38s cubic-bezier(0.33, 1, 0.68, 1);
  pointer-events: all;
}

.sheet-inner {
  background: rgba(13,16,23,0.96);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-top: 1px solid var(--border-b);
  border-radius: 18px 18px 0 0;
  padding: 0 32px 24px;
  box-shadow: 0 -12px 48px rgba(0,0,0,.65), 0 0 0 1px rgba(255,255,255,.04);
}

/* drag handle */
.sheet-handle {
  width: 36px; height: 4px; border-radius: 4px;
  background: var(--border-b); margin: 12px auto 18px;
}

.sheet-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 18px; gap: 12px;
}
.sheet-title { font-size: 16px; font-weight: 700; margin-bottom: 3px; }
.sheet-sub   { font-size: 10px; color: var(--muted-l); font-family: var(--mono); }

.sheet-header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

.close-btn {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--card); border: 1px solid var(--border-b);
  color: var(--muted-l); font-size: 16px; line-height: 1;
  cursor: pointer; display: grid; place-items: center;
  transition: all .18s;
}
.close-btn:hover { background: var(--border-b); color: var(--white); }

/* 3-column metric bars */
.sheet-metrics {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 20px; margin-bottom: 18px;
}
.sm-block { display: flex; flex-direction: column; gap: 6px; }
.sm-head  { display: flex; justify-content: space-between; align-items: baseline; }
.sm-lbl   { font-size: 9.5px; color: var(--muted-l); text-transform: uppercase; letter-spacing: .08em; }
.sm-val   { font-family: var(--mono); font-size: 13px; font-weight: 500; }
.track    { height: 3px; background: var(--border); border-radius: 3px; overflow: hidden; }
.fill     { height: 100%; border-radius: 3px; background: var(--blue); transition: width .55s ease; }
.fill.warn   { background: var(--moderate); }
.fill.danger { background: var(--danger); }

/* Advisory row */
.sheet-advisory { display: flex; align-items: flex-start; gap: 12px; }
.adv-btn {
  flex-shrink: 0; padding: 9px 16px;
  background: transparent; border: 1px solid var(--blue);
  color: var(--blue-bright); border-radius: 8px;
  font-size: 11px; font-weight: 600; letter-spacing: .06em;
  text-transform: uppercase; cursor: pointer; transition: all .2s; white-space: nowrap;
}
.adv-btn:hover { background: var(--blue-dim); box-shadow: 0 0 18px var(--blue-glow); }
.adv-btn:disabled { opacity: .45; cursor: not-allowed; }
#advisory-out {
  flex: 1; font-size: 11.5px; line-height: 1.75; color: var(--muted-l);
  display: none; animation: fadein .4s ease;
}
@keyframes fadein { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:translateY(0)} }

/* ════════════════════ TOASTS ════════════════════ */
#toasts {
  position: fixed; top: 18px; right: 18px; z-index: 9999;
  display: flex; flex-direction: column; gap: 8px; pointer-events: none;
}
.toast {
  background: var(--card); border: 1px solid var(--blue);
  border-radius: 10px; padding: 11px 16px;
  font-size: 11.5px; color: var(--white); max-width: 290px;
  box-shadow: 0 4px 28px rgba(0,0,0,.55), 0 0 24px var(--blue-glow);
  animation: t-in .26s ease forwards;
}
.toast.out { animation: t-out .26s ease forwards; }
@keyframes t-in  { from{opacity:0;transform:translateX(12px)} to{opacity:1;transform:translateX(0)} }
@keyframes t-out { from{opacity:1;transform:translateX(0)} to{opacity:0;transform:translateX(12px)} }

/* ════════════════════ MISC ════════════════════ */
.skel {
  height: 78px; border-radius: 10px; margin-bottom: 5px;
  background: linear-gradient(90deg, var(--card) 25%, #1a2235 50%, var(--card) 75%);
  background-size: 200% 100%; animation: shimmer 1.4s infinite;
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.spin {
  width: 11px; height: 11px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,.2); border-top-color: #fff;
  animation: spin .6s linear infinite; display: inline-block;
}
@keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>
<body>

<div id="app">

  <!-- ════════ SIDEBAR (lean — list + form only) ════════ -->
  <aside id="sidebar">

    <div class="sb-header">
      <div class="logo">
        <div class="logo-mark">◉</div>
        <span class="logo-text">DEEPBLUE</span>
      </div>
      <div class="logo-sub">Real-time water safety intelligence</div>
    </div>

    <div class="section-label">
      Monitoring Stations
      <div class="live-pill"><div class="pulse"></div>LIVE</div>
    </div>

    <div id="site-list">
      <div class="skel"></div>
      <div class="skel"></div>
      <div class="skel"></div>
    </div>

    <div class="report-section">
      <div class="section-label" style="padding:0 0 10px">Submit Community Report</div>
      <form class="form-col"
            hx-post="/api/reports"
            hx-encoding="multipart/form-data"
            hx-target="#notif"
            hx-swap="innerHTML"
            onsubmit="onSubmitReport(this)">

        <select name="site_id" id="site-select" class="fi" required>
          <option value="" disabled selected>Select a station…</option>
        </select>

        <div class="drop-zone" id="drop-zone">
          <input type="file" name="image" id="file-input" accept="image/*" required onchange="onFileChange(this)">
          <div class="drop-lbl">Drop photo or <span>browse</span></div>
          <div id="fname"></div>
        </div>

        <button type="submit" class="submit-btn" id="submit-btn">Submit Report</button>
      </form>
      <div id="notif"></div>
    </div>

  </aside>

  <!-- ════════ MAP ════════ -->
  <div id="map"></div>

</div>

<!-- ════════ BOTTOM SHEET (slides up over map on click) ════════ -->
<div id="detail-sheet">
  <div class="sheet-inner">
    <div class="sheet-handle"></div>

    <div class="sheet-header">
      <div>
        <div class="sheet-title" id="sh-name">—</div>
        <div class="sheet-sub"  id="sh-sub">—</div>
      </div>
      <div class="sheet-header-right">
        <div class="badge b-unknown" id="sh-badge">UNKNOWN</div>
        <button class="close-btn" onclick="closeSheet()">×</button>
      </div>
    </div>

    <div class="sheet-metrics">
      <div class="sm-block">
        <div class="sm-head">
          <span class="sm-lbl">pH</span>
          <span class="sm-val" id="sh-ph">—</span>
        </div>
        <div class="track"><div class="fill" id="fill-ph" style="width:0%"></div></div>
      </div>
      <div class="sm-block">
        <div class="sm-head">
          <span class="sm-lbl">Temperature</span>
          <span class="sm-val" id="sh-temp">—</span>
        </div>
        <div class="track"><div class="fill" id="fill-temp" style="width:0%"></div></div>
      </div>
      <div class="sm-block">
        <div class="sm-head">
          <span class="sm-lbl">Turbidity</span>
          <span class="sm-val" id="sh-turb">—</span>
        </div>
        <div class="track"><div class="fill" id="fill-turb" style="width:0%"></div></div>
      </div>
    </div>

    <div class="sheet-advisory">
      <button class="adv-btn" id="adv-btn" onclick="fetchAdvisory()">✦ AI Advisory</button>
      <div id="advisory-out"></div>
    </div>
  </div>
</div>

<!-- Toasts -->
<div id="toasts"></div>

<script>
let entities  = [];
let markers   = {};
let selected  = null;
let firstLoad = true;

// ── Map ────────────────────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: true }).setView([41, -80], 5);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
  subdomains: 'abcd', maxZoom: 19,
}).addTo(map);

// ── Helpers ────────────────────────────────────────────────────────────────────
const safetyColor = l =>
  l === 'safe' ? '#3b82f6' : l === 'moderate' ? '#f59e0b' : l === 'dangerous' ? '#ef4444' : '#3d4f68';

const badgeClass = l =>
  l === 'safe' ? 'b-safe' : l === 'moderate' ? 'b-moderate' : l === 'dangerous' ? 'b-dangerous' : 'b-unknown';

const badgeText = l => l ? l.toUpperCase() : 'UNKNOWN';

function metrics(e) {
  const m = e.official_metrics || {};
  return {
    ph:   m.ph   != null && m.ph   !== 0 ? +m.ph   : null,
    temp: m.temp_c != null && m.temp_c !== 0 ? +m.temp_c : null,
    turb: m.turbidity_ntu != null && m.turbidity_ntu !== 0 ? +m.turbidity_ntu : null,
  };
}
function fmt(val, digits) { return val == null ? '--' : val.toFixed(digits); }

function markerIcon(label, active) {
  const color  = safetyColor(label);
  const size   = active ? 22 : 14;
  const shadow = active
    ? `0 0 0 5px rgba(255,255,255,.1), 0 0 26px ${color}`
    : `0 0 12px ${color}99`;
  const border = active ? 'rgba(255,255,255,.5)' : 'rgba(255,255,255,.18)';
  return L.divIcon({
    className: '',
    html: `<div style="width:${size}px;height:${size}px;border-radius:50%;
      background:${color};box-shadow:${shadow};border:2px solid ${border};transition:all .3s;"></div>`,
    iconSize: [size,size], iconAnchor: [size/2,size/2],
  });
}

function setBar(id, pct, cls) {
  const el = document.getElementById(id);
  el.style.width = Math.min(pct, 100) + '%';
  el.className = 'fill' + (cls ? ' ' + cls : '');
}

// ── Render list ────────────────────────────────────────────────────────────────
function renderList() {
  const el = document.getElementById('site-list');
  el.innerHTML = '';
  entities.forEach(e => {
    const id = e.site_id || '', lbl = e.safety_label || '';
    const m = metrics(e), active = id === selected;
    const card = document.createElement('div');
    card.className = 'site-card' + (active ? ' active' : '');
    card.dataset.id = id;
    card.innerHTML = `
      <div class="sc-top">
        <div class="sc-name">${e.name || id}</div>
        <div class="badge ${badgeClass(lbl)}">${badgeText(lbl)}</div>
      </div>
      <div class="sc-metrics">
        <div><div class="sc-ml">pH</div>  <div class="sc-mv">${fmt(m.ph,2)}</div></div>
        <div><div class="sc-ml">Temp</div><div class="sc-mv">${m.temp != null ? m.temp.toFixed(1)+'°' : '--'}</div></div>
        <div><div class="sc-ml">NTU</div> <div class="sc-mv">${fmt(m.turb,1)}</div></div>
      </div>`;
    card.addEventListener('click', () => selectSite(id));
    el.appendChild(card);
  });
}

// ── Render markers ─────────────────────────────────────────────────────────────
function renderMarkers() {
  const bounds = [];
  entities.forEach(e => {
    const id = e.site_id || '';
    const c  = e.location && e.location.coordinates;
    if (!c) return;
    const [lng, lat] = c, active = id === selected;
    if (markers[id]) {
      markers[id].setIcon(markerIcon(e.safety_label, active));
    } else {
      const mk = L.marker([lat, lng], { icon: markerIcon(e.safety_label, active) }).addTo(map);
      mk.on('click', () => selectSite(id));
      markers[id] = mk;
    }
    bounds.push([lat, lng]);
  });
  if (firstLoad && bounds.length) {
    map.fitBounds(bounds, { padding: [60, 60] });
    firstLoad = false;
  }
}

function populateSelect() {
  const sel = document.getElementById('site-select'), cur = sel.value;
  sel.innerHTML = '<option value="" disabled>Select a station…</option>';
  entities.forEach(e => {
    const o = document.createElement('option');
    o.value = e.site_id || ''; o.textContent = e.name || e.site_id;
    sel.appendChild(o);
  });
  if (cur) sel.value = cur;
}

// ── Select site ────────────────────────────────────────────────────────────────
function selectSite(id) {
  selected = id;
  const e = entities.find(x => x.site_id === id);
  if (!e) return;

  document.querySelectorAll('.site-card').forEach(c =>
    c.classList.toggle('active', c.dataset.id === id));

  Object.entries(markers).forEach(([sid, mk]) => {
    const ent = entities.find(x => x.site_id === sid);
    if (ent) mk.setIcon(markerIcon(ent.safety_label, sid === id));
  });

  const c = e.location && e.location.coordinates;
  if (c) map.panTo([c[1], c[0]], { animate: true, duration: 0.5 });

  openSheet(e);
}

// ── Bottom sheet ───────────────────────────────────────────────────────────────
function openSheet(e) {
  const m   = metrics(e);
  const lbl = e.safety_label || '';

  document.getElementById('sh-name').textContent = e.name || e.site_id;
  document.getElementById('sh-sub').textContent  = `USGS Station ${e.site_id || '—'}`;

  const badge = document.getElementById('sh-badge');
  badge.textContent = badgeText(lbl);
  badge.className   = 'badge ' + badgeClass(lbl);

  document.getElementById('sh-ph').textContent   = fmt(m.ph, 2);
  document.getElementById('sh-temp').textContent = m.temp != null ? `${m.temp.toFixed(1)} °C` : '--';
  document.getElementById('sh-turb').textContent = m.turb != null ? `${m.turb.toFixed(1)} NTU` : '--';

  setBar('fill-ph',   m.ph   != null ? (m.ph   / 14) * 100 : 0, m.ph != null && (m.ph < 6.5 || m.ph > 8.5) ? 'warn' : '');
  setBar('fill-temp', m.temp != null ? (m.temp / 35) * 100 : 0, m.temp != null && m.temp > 25 ? 'warn' : '');
  setBar('fill-turb', m.turb != null ? (m.turb / 50) * 100 : 0, m.turb != null && (m.turb > 25 ? 'danger' : m.turb > 15 ? 'warn' : ''));

  // Reset advisory
  const adv = document.getElementById('advisory-out');
  adv.style.display = 'none'; adv.textContent = '';
  const btn = document.getElementById('adv-btn');
  btn.disabled = false; btn.textContent = '✦ AI Advisory';

  document.getElementById('detail-sheet').classList.add('open');
}

function closeSheet() {
  document.getElementById('detail-sheet').classList.remove('open');
  selected = null;
  document.querySelectorAll('.site-card').forEach(c => c.classList.remove('active'));
  Object.entries(markers).forEach(([sid, mk]) => {
    const ent = entities.find(x => x.site_id === sid);
    if (ent) mk.setIcon(markerIcon(ent.safety_label, false));
  });
}

// Close sheet on map click (outside a marker)
map.on('click', closeSheet);

// ── Advisory ───────────────────────────────────────────────────────────────────
async function fetchAdvisory() {
  if (!selected) return;
  const btn = document.getElementById('adv-btn');
  const out = document.getElementById('advisory-out');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Analyzing…';
  out.style.display = 'none';

  try {
    const data = await fetch(`/api/entity/${selected}/advisory`).then(r => r.json());
    out.textContent = data.advisory || 'No advisory available.';
    out.style.display = 'block';
    btn.textContent = '↺ Refresh';
  } catch {
    out.textContent = 'Failed to generate advisory.';
    out.style.display = 'block';
    btn.textContent = '✦ AI Advisory';
  }
  btn.disabled = false;
}

// ── Fetch loop ─────────────────────────────────────────────────────────────────
async function fetchEntities() {
  try {
    entities = await fetch('/api/entities').then(r => r.json()) || [];
    renderList(); renderMarkers(); populateSelect();
    if (selected) {
      const e = entities.find(x => x.site_id === selected);
      if (e) openSheet(e);
    }
  } catch(err) { console.error('fetchEntities:', err); }
}

// ── File input ─────────────────────────────────────────────────────────────────
function onFileChange(input) {
  document.getElementById('fname').textContent = input.files[0]?.name || '';
}
const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('over'));
dz.addEventListener('drop',      () => dz.classList.remove('over'));

// ── Report submit ──────────────────────────────────────────────────────────────
function onSubmitReport(form) {
  const btn = document.getElementById('submit-btn');
  btn.innerHTML = '<span class="spin"></span> Uploading…';
  btn.disabled = true;
  document.body.addEventListener('htmx:afterSwap', function h(evt) {
    if (evt.detail.target.id === 'notif') {
      btn.textContent = 'Submit Report'; btn.disabled = false;
      form.reset(); document.getElementById('fname').textContent = '';
      const txt = document.getElementById('notif').textContent;
      if (txt) toast(txt);
      document.body.removeEventListener('htmx:afterSwap', h);
    }
  });
}

// ── Toast ──────────────────────────────────────────────────────────────────────
function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => { el.classList.add('out'); setTimeout(() => el.remove(), 280); }, 3800);
}

// ── Boot ───────────────────────────────────────────────────────────────────────
fetchEntities();
setInterval(fetchEntities, 30000);
</script>
