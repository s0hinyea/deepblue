<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepBlue — Water Safety Sentinel</title>

    <!-- Leaflet.js: interactive map rendering -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- HTMX: server-driven UI updates -->
    <script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }

        #map {
            flex: 1;
            height: 100vh;
        }

        #sidebar {
            width: 360px;
            height: 100vh;
            overflow-y: auto;
            background: #f8f9fa;
            border-left: 1px solid #dee2e6;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        #sidebar h1 {
            font-size: 1.4rem;
            color: #0d6efd;
        }

        #sidebar p.subtitle {
            font-size: 0.85rem;
            color: #6c757d;
        }

        #entity-panel {
            background: #fff;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 1rem;
            min-height: 120px;
            color: #6c757d;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <!-- Leaflet map fills the left side -->
    <div id="map"></div>

    <!-- HTMX-powered sidebar for entity details and reports -->
    <div id="sidebar">
        <h1>DeepBlue</h1>
        <p class="subtitle">Community water safety — click a marker to view details.</p>

        <!-- This div will be swapped by HTMX when a marker is clicked -->
        <div id="entity-panel">
            Select a water body on the map to see its safety status and recent reports.
        </div>
    </div>

    <script>
        // Initialize Leaflet map centered on NYC
        const map = L.map('map').setView([40.7128, -74.0060], 11);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);
    </script>

</body>
</html>
