{{ define "title" }}DeepBlue Dashboard{{ end }}

  <main class="dashboard-shell">
    <section class="dashboard-grid">
      {{ template "map-panel" . }}

      <aside class="dashboard-rail" aria-label="Controls and alerts">
        {{ template "upload-panel" . }}
        {{ template "alerts-panel" . }}
      </aside>
    </section>
  </main>
{{ end }}
